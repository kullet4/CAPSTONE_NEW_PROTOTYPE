<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard | E-LMS</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
</head>
<body class="bg-light">

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="#">E-LMS Teacher Portal</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <span class="nav-link text-white" id="user-greeting">Loading...</span>
                    </li>
                    <li class="nav-item">
                        <button id="logout-btn" class="btn btn-outline-light btn-sm ms-3 mt-1">Log Out</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-4 mb-5">
        <div class="row g-4">
            
            <!-- Left Column: Module Creation -->
            <div class="col-lg-5">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-header bg-white border-bottom pb-2 pt-3">
                        <h5 class="card-title text-success mb-0"><i class="bi bi-file-earmark-plus"></i> Create Instructional Material</h5>
                    </div>
                    <div class="card-body">
                        <form id="create-module-form">
                            <div class="mb-3">
                                <label for="module-title" class="form-label text-muted">Module Title</label>
                                <input type="text" class="form-control" id="module-title" required placeholder="e.g., Intro to Biology">
                            </div>
                            <div class="mb-3">
                                <label for="module-desc" class="form-label text-muted">Description / Objectives</label>
                                <textarea class="form-control" id="module-desc" rows="3" required placeholder="Describe the learning outcomes..."></textarea>
                            </div>
                            <div class="mb-3">
                                <label for="module-xp" class="form-label text-muted">XP Reward (Upon Completion)</label>
                                <input type="number" class="form-control" id="module-xp" required min="10" max="500" value="50">
                                <small class="text-muted">Motivates students through points-based progression.</small>
                            </div>
                            <div id="module-alert" class="alert alert-success d-none mb-3" role="alert">
                                Module successfully created!
                            </div>
                            <button type="submit" class="btn btn-success w-100">Publish Material</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Right Column: Real-time Student Monitoring -->
            <div class="col-lg-7">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-header bg-white border-bottom pb-2 pt-3 d-flex justify-content-between align-items-center">
                        <h5 class="card-title text-primary mb-0"><i class="bi bi-people"></i> Real-Time Student Analytics</h5>
                        <span class="badge bg-primary rounded-pill" id="student-count">0</span>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0">
                                <thead class="table-light text-muted">
                                    <tr>
                                        <th scope="col" class="ps-4">Student Name</th>
                                        <th scope="col">Total XP</th>
                                        <th scope="col">Current Status</th>
                                        <th scope="col" class="text-end pe-4">Action</th>
                                    </tr>
                                </thead>
                                <tbody id="student-monitoring-list">
                                    <!-- Students will be injected here via JS (onSnapshot) -->
                                    <tr>
                                        <td colspan="4" class="text-center py-4 text-muted">
                                            <div class="spinner-border spinner-border-sm text-primary" role="status"></div> Loading classroom data...
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- App Scripts -->
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/teacher.js"></script>
</body>
</html>
