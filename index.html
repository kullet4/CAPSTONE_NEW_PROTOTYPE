<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-LMS SDT Based Platform</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="container mt-5" id="app-container">
        <div class="row justify-content-center">
            <div class="col-md-6 text-center">
                <h1>Welcome to E-LMS</h1>
                <p class="lead">Empowering Learners through Competence, Autonomy, and Relatedness.</p>
                <div id="auth-section" class="mt-4">
                    <!-- Login Form placeholder -->
                    <p>Loading Authentication...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div class="modal fade" id="forgotPasswordModal" tabindex="-1" aria-labelledby="forgotPasswordModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4 border-0 shadow-lg">
                <div class="modal-header border-bottom-0 pb-0">
                    <h5 class="modal-title fw-bold text-dark" id="forgotPasswordModalLabel">Reset password</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body pt-3 pb-4">
                    <p class="text-muted small">Enter the email address associated with your account, and we will send you a secure link to reset your password.</p>
                    <form id="reset-password-form">
                        <div class="mb-3">
                            <input type="email" class="form-control" id="reset-email" placeholder="student@school.edu" required>
                        </div>
                        <div id="reset-msg" class="small mb-3"></div>

                        <button type="submit" class="btn btn-primary w-100 rounded-pill shadow-sm" id="submit-reset-btn">
                            Send Reset Link
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- App Scripts -->
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
