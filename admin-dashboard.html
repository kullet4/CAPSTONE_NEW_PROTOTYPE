<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | E-LMS</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
</head>
<body class="bg-light">

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#"><i class="bi bi-shield-lock"></i> E-LMS System Admin</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <span class="nav-link text-white" id="user-greeting">Loading...</span>
                    </li>
                    <li class="nav-item">
                        <button id="logout-btn" class="btn btn-outline-light btn-sm ms-3 mt-1">Log Out</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content Grid -->
    <div class="container mt-4 mb-5">
        
        <!-- Platform Health Overview (KPIs) -->
        <div class="row g-3 mb-4 text-center">
            <div class="col-md-3 col-sm-6">
                <div class="card shadow-sm border-0 bg-primary text-white h-100">
                    <div class="card-body">
                        <h6 class="mb-1 text-uppercase opacity-75">Total Users</h6>
                        <h2 class="mb-0 fw-bold" id="kpi-users">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3 col-sm-6">
                <div class="card shadow-sm border-0 bg-success text-white h-100">
                    <div class="card-body">
                        <h6 class="mb-1 text-uppercase opacity-75">Active Students</h6>
                        <h2 class="mb-0 fw-bold" id="kpi-students">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3 col-sm-6">
                <div class="card shadow-sm border-0 bg-info text-dark h-100">
                    <div class="card-body">
                        <h6 class="mb-1 text-uppercase opacity-75">Active Teachers</h6>
                        <h2 class="mb-0 fw-bold" id="kpi-teachers">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3 col-sm-6">
                <div class="card shadow-sm border-0 bg-warning text-dark h-100">
                    <div class="card-body">
                        <h6 class="mb-1 text-uppercase opacity-75">Learning Modules</h6>
                        <h2 class="mb-0 fw-bold" id="kpi-modules">0</h2>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            
            <!-- Left Column: User Management -->
            <div class="col-lg-6">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-header bg-white border-bottom pb-2 pt-3 d-flex justify-content-between align-items-center">
                        <h5 class="card-title text-dark mb-0"><i class="bi bi-people-fill text-primary"></i> System Users</h5>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive" style="max-height: 400px; overflow-y: auto;">
                            <table class="table table-hover mb-0 align-middle">
                                <thead class="table-light text-muted sticky-top">
                                    <tr>
                                        <th scope="col" class="ps-4">Name/Email</th>
                                        <th scope="col">Role</th>
                                        <th scope="col">Stats</th>
                                        <th scope="col" class="text-end pe-4">Action</th>
                                    </tr>
                                </thead>
                                <tbody id="users-list">
                                    <tr>
                                        <td colspan="4" class="text-center py-4 text-muted">
                                            <div class="spinner-border spinner-border-sm text-primary" role="status"></div> Loading users...
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Column: Content Moderation -->
            <div class="col-lg-6">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-header bg-white border-bottom pb-2 pt-3 d-flex justify-content-between align-items-center">
                        <h5 class="card-title text-dark mb-0"><i class="bi bi-journal-check text-success"></i> Content Moderation</h5>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive" style="max-height: 400px; overflow-y: auto;">
                            <table class="table table-hover mb-0 align-middle">
                                <thead class="table-light text-muted sticky-top">
                                    <tr>
                                        <th scope="col" class="ps-4">Module Title</th>
                                        <th scope="col">Author</th>
                                        <th scope="col">XP Reward</th>
                                        <th scope="col" class="text-end pe-4">Action</th>
                                    </tr>
                                </thead>
                                <tbody id="modules-list">
                                    <tr>
                                        <td colspan="4" class="text-center py-4 text-muted">
                                            <div class="spinner-border spinner-border-sm text-success" role="status"></div> Loading modules...
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- App Scripts -->
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/admin.js"></script>
</body>
</html>
