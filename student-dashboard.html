<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard | E-LMS</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons (for badges/gamification) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
</head>
<body class="bg-light">

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="#">E-LMS Student</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <span class="nav-link text-white" id="user-greeting">Loading...</span>
                    </li>
                    <li class="nav-item">
                        <button id="logout-btn" class="btn btn-outline-light btn-sm ms-3 mt-1">Log Out</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content Grid -->
    <div class="container mt-4 mb-5">
        <div class="row g-4">
            
            <!-- Left Column: Competence (Progress & Badges) -->
            <div class="col-lg-8">
                <!-- Points Card -->
                <div class="card shadow-sm border-0 mb-4 bg-gradient-primary text-white" style="background: linear-gradient(135deg, #0d6efd, #0dcaf0);">
                    <div class="card-body p-4 d-flex justify-content-between align-items-center">
                        <div>
                            <h4 class="mb-0">Your Progress</h4>
                            <p class="mb-0 opacity-75">Keep up the great work!</p>
                        </div>
                        <div class="text-end">
                            <h2 class="display-4 fw-bold mb-0" id="xp-points">0</h2>
                            <span>XP Earned</span>
                        </div>
                    </div>
                </div>

                <!-- Autonomy: Learning Paths -->
                <h5 class="mb-3 text-secondary">My Learning Paths <i class="bi bi-compass"></i></h5>
                <div class="row g-3 mb-4" id="learning-modules">
                    <!-- Modules will be loaded here dynamically -->
                    <div class="col-md-6">
                        <div class="card shadow-sm border-0 h-100 module-card">
                            <div class="card-body">
                                <h6>Introduction to Biology</h6>
                                <div class="progress mb-2" style="height: 10px;">
                                    <div class="progress-bar bg-success" role="progressbar" style="width: 25%" aria-valuenow="25" aria-valuemin="0" aria-valuemax="100"></div>
                                </div>
                                <small class="text-muted">25% Completed</small>
                                <button class="btn btn-sm btn-outline-primary w-100 mt-3 disabled">Available Soon</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Competence: Badges -->
                <h5 class="mb-3 text-secondary">Earned Badges <i class="bi bi-award"></i></h5>
                <div class="card shadow-sm border-0">
                    <div class="card-body">
                        <div class="row text-center" id="badges-container">
                            <div class="col-4 col-md-3 mb-3">
                                <div class="badge-icon text-warning mb-2 bg-light rounded-circle p-3 d-inline-block shadow-sm">
                                    <i class="bi bi-star-fill fs-2"></i>
                                </div>
                                <div><small>Novice</small></div>
                            </div>
                            <!-- More badges loaded here -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Column: Relatedness (Leaderboard & Community) -->
            <div class="col-lg-4">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-header bg-white border-bottom pb-2 pt-3">
                        <h5 class="card-title mb-0 text-secondary">Leaderboard <i class="bi bi-trophy text-warning"></i></h5>
                    </div>
                    <div class="card-body p-0">
                        <ul class="list-group list-group-flush" id="leaderboard-list">
                            <!-- Leaderboard items will be loaded here dynamically -->
                            <li class="list-group-item text-center py-4 text-muted">
                                <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
                                <span class="ms-2">Loading ranks...</span>
                            </li>
                        </ul>
                    </div>
                    <div class="card-footer bg-white text-center border-top-0">
                        <small class="text-muted">Ranked by total XP. Work together to climb!</small>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- App Scripts -->
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/student.js"></script>
</body>
</html>
